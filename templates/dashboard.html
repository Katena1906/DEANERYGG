<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд — Единый деканат</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1>Единый деканат</h1>
                <span class="role-badge">{{ user.role }}</span>
            </div>
            <a href="{{ url_for('logout') }}" class="logout-link">Выход</a>
        </div>
        
        <div class="redirect-message">
            <p>Перенаправление в панель {{ user.role }}</p>
            <p class="small-text">Если перенаправление не произошло, перейдите на страницу входа</p>
        </div>
        
        <script>
            setTimeout(function() {
                window.location.reload();
            }, 100);
        </script>
    </div>
</body>
</html>
