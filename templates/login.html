
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Единый деканат</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<style>
        /* Дополнительные стили */
        
        /* Стили для автозаполнения браузера */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            box-shadow: 0 0 0 30px white inset !important;
            background-color: white !important;
        }
        
        /* Кнопка показа пароля */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-wrapper input {
            flex: 1;
            padding-right: 80px;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 2;
            color: #666;
        }
        
        .toggle-password:hover {
            opacity: 1;
        }
        
        /* Стиль для уведомления о статусе JavaScript */
        .js-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            transition: all 0.3s;
        }
        
        .js-status.success {
            background: #27ae60;
            color: white;
        }
        
        /* Сообщение для пользователей с отключенным JS */
        .no-js-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Скрываем элементы, которые требуют JS */
        .js-required {
            display: none;
        }
        
        /* Показываем их, когда JS включен */
        .js-enabled .js-required {
            display: block;
        }
        
        .field-error {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
            min-height: 20px;
        }
        
        input.invalid {
            border-color: #e74c3c !important;
            background-color: #fff5f5;
        }
        
        .btn-loader {
            display: inline-block;
        }
    </style> 
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h1>Единый деканат</h1>
            <p class="subtitle">Система управления учебным процессом</p>
            
            <div id="error-container">
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}
            </div>
            
            <form id="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" name="email" required autofocus>
                    <div class="field-error" id="email-error"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" id="toggle-password">Показать</button>
                    </div>
                    <div class="field-error" id="password-error"></div>
                </div>
                
                <button type="submit" class="btn-primary">Войти в систему</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('login-form');
            var emailInput = document.getElementById('email');
            var passwordInput = document.getElementById('password');
            var emailError = document.getElementById('email-error');
            var passwordError = document.getElementById('password-error');
            var toggleBtn = document.getElementById('toggle-password');
            
            function validateEmail() {
                var email = emailInput.value.trim();
                var emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                
                if (!email) {
                    emailError.textContent = 'Email обязателен';
                    emailInput.style.borderColor = '#e74c3c';
                    return false;
                } else if (!emailRegex.test(email)) {
                    emailError.textContent = 'Введите корректный email';
                    emailInput.style.borderColor = '#e74c3c';
                    return false;
                } else {
                    emailError.textContent = '';
                    emailInput.style.borderColor = '';
                    return true;
                }
            }
            
            function validatePassword() {
                var password = passwordInput.value;
                
                if (!password) {
                    passwordError.textContent = 'Введите пароль';
                    passwordInput.style.borderColor = '#e74c3c';
                    return false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Пароль должен содержать минимум 6 символов';
                    passwordInput.style.borderColor = '#e74c3c';
                    return false;
                } else {
                    passwordError.textContent = '';
                    passwordInput.style.borderColor = '';
                    return true;
                }
            }
            
            // Показать/скрыть пароль
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    var type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? 'Показать' : 'Скрыть';
                });
            }
            
            emailInput.addEventListener('input', function() {
                validateEmail();
                var serverError = document.querySelector('.error-message');
                if (serverError && serverError.id !== 'form-error') {
                    serverError.style.display = 'none';
                }
            });
            
            passwordInput.addEventListener('input', function() {
                validatePassword();
                var serverError = document.querySelector('.error-message');
                if (serverError && serverError.id !== 'form-error') {
                    serverError.style.display = 'none';
                }
            });
            
            emailInput.addEventListener('blur', validateEmail);
            passwordInput.addEventListener('blur', validatePassword);
            
            form.addEventListener('submit', function(event) {
                var isEmailValid = validateEmail();
                var isPasswordValid = validatePassword();
                
                if (!isEmailValid || !isPasswordValid) {
                    event.preventDefault();
                    
                    var errorDiv = document.getElementById('form-error');
                    if (!errorDiv) {
                        errorDiv = document.createElement('div');
                        errorDiv.id = 'form-error';
                        errorDiv.className = 'error-message';
                        form.insertBefore(errorDiv, form.firstChild);
                    }
                    errorDiv.textContent = 'Пожалуйста, исправьте ошибки в форме';
                    errorDiv.style.display = 'block';
                    
                    setTimeout(function() {
                        errorDiv.style.display = 'none';
                    }, 3000);
                }
            });
        });
    </script>
</body>
</html>
